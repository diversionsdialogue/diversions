    rewrite ^/gravity-forms-formulieren/?$ / permanent;
    rewrite ^/groepsdiscussie/?$ /blog/groepsdiscussie permanent;
    rewrite ^/heatmaps/?$ /services/gebruikerstesten permanent;
    rewrite ^/innovatie-hoe-maak-goed-idee-zakelijk-succes/?$ /onze-diensten permanent;
    rewrite ^/innovatiebureau/?$ /onze-diensten permanent;
    rewrite ^/insights/?$ /blog/kwalitatief-onderzoek-de-basis-voor-succes permanent;
    rewrite ^/interviews-en-panels/?$ /blog/patient-echt-begrijpen permanent;
    rewrite ^/services/interviews-en-panels/?$ /blog/patient-echt-begrijpen permanent;
    rewrite ^/kpi-dashboards-meer-inzicht-betrokkenheid/?$ / permanent;
    rewrite ^/leadgeneratie-marketing-automation-hoe-laat-je-leads-converteren/?$ / permanent;
    rewrite ^/marketing-innovatie-adviseur/?$ /onze-diensten permanent;
    rewrite ^/marketingautomation-2020-trends-op-een-rij/?$ / permanent;
    rewrite ^/micro-journey-de-waardevolle-verdieping-op-customer-journeys/?$ /services/micro-journey-de-waardevolle-verdieping-op-customer-journeys permanent;
    rewrite ^/nalaten-aan-een-goed-doel-de-drijfveren-onderzocht/?$ /blog/nalaten-aan-een-goed-doel-de-drijfveren-onderzocht permanent;
