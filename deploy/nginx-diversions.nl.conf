    rewrite ^/pretest/?$ /services/pretest permanent;
    rewrite ^/priming-de-waarde-voor-marketing/?$ /blog/priming-de-waarde-voor-marketing permanent;
    rewrite ^/productlancering/?$ / permanent;
    rewrite ^/propositie-creatie-van-concept-naar-succes/?$ /blog/propositie-ontwikkeling-checklist permanent;
    rewrite ^/rich-content/?$ / permanent;
    rewrite ^/rich-content-plaats-een-calculator-op-je-site/?$ / permanent;
    rewrite ^/samenwerken-met-generatie-z-lees-ons-boek/?$ /blog/samenwerken-met-generatie-z-lees-ons-boek permanent;
    rewrite ^/seo-diensten-die-bouwen-aan-je-online-succes/?$ / permanent;
    rewrite ^/sitemap/?$ / permanent;
    rewrite ^/sociaal-bewijs-ontdek-het-breingeheim-van-neuromarketing/?$ /blog/sociaal-bewijs-ontdek-het-breingeheim-van-neuromarketing permanent;
    rewrite ^/template-customer-journey/?$ /blog/template-customer-journey permanent;
    rewrite ^/template-patient-journey/?$ /blog/template-patient-journey permanent;
    rewrite ^/uitdaging-voor-het-begrijpen-van-de-customer-journey/?$ /blog/uitdaging-voor-het-begrijpen-van-de-customer-journey permanent;
    rewrite ^/voorbeelden-van-pretesting/?$ /blog/voorbeelden-van-pretesting permanent;
    rewrite ^/waardepropositie-ontwikkelen-template/?$ /onze-diensten permanent;
    rewrite ^/wat-is-een-pretest-zo-bespaar-je-tijd-en-marketingbudget/?$ /blog/wat-is-een-pretest-zo-bespaar-je-tijd-en-marketingbudget permanent;

    # --- Extra (handmatig, niet uit inventaris) ---
    rewrite ^/online-onderzoek-2/?$ /blog/online-onderzoek permanent;
    rewrite ^/thema/blog/?$ /blog permanent;
    rewrite ^/thema/blog/journey/?$ /blog permanent;
    rewrite ^/thema/blog/onderzoek/?$ /blog permanent;
    rewrite ^/thema/blog/optimalisatie/?$ /blog permanent;
    rewrite ^/thema/contact/?$ /contact permanent;
    rewrite ^/thema/fondsenwerving/?$ /blog/onderzoeksbureau-fondsenwerving permanent;
    rewrite ^/thema/over-diversions/?$ /wij-zijn-diversions permanent;
    rewrite ^/services/?$ /onze-diensten permanent;

    # --- 410 GONE — content definitief verwijderd, geen redirect ---
    location ~ ^/campagne-maag-lever-darm-stichting/?$ { return 410; }
    location ~ ^/customer-journey-kpi-dashboards/?$ { return 410; }
    location ~ ^/innovatie-intake/?$ { return 410; }
    location ~ ^/kpi-online-resultaat/?$ { return 410; }
    location ~ ^/marketing-automation/?$ { return 410; }
    location ~ ^/online-marketing-amersfoort/?$ { return 410; }
    location ~ ^/search-console/?$ { return 410; }
    location ~ ^/services/web-develpment/?$ { return 410; }
    location ~ ^/volgende-stap-voor-de-maag-lever-darm-stichting/?$ { return 410; }
    location ~ ^/wat-is-een-unique-selling-point-usp-check/?$ { return 410; }
    location ~ ^/wp-rocket/?$ { return 410; }

    # =======================================================================
    # Statische site (Astro)
    # =======================================================================

    # Gehashte buildassets: onbeperkt cachen (bestandsnaam wijzigt per build).
    # Dit blok heeft een eigen add_header, dus de server-level security headers
    # worden hier NIET geërfd: de relevante (nosniff + HSTS) staan daarom expliciet.
    location ^~ /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security $hsts_header always;
        access_log off;
        try_files $uri =404;
    }

    # Fonts: wijzigen praktisch nooit -> 1 jaar immutable. (nosniff + HSTS herhaald.)
    location ~* \.(?:woff2?|ttf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security $hsts_header always;
        access_log off;
        try_files $uri =404;
    }

    # Overige media: 30 dagen. Niet immutable/1-jaar want deze bestanden zijn
    # niet gehasht; bij vervanging (zelfde naam) moet de cache kunnen verversen.
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security $hsts_header always;
        access_log off;
        try_files $uri =404;
    }

    # Web app manifest: nginx' mime.types kent .webmanifest hier niet (viel terug
    # op application/octet-stream), daarom expliciet het juiste MIME-type.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security $hsts_header always;
        access_log off;
        try_files $uri =404;
    }

    # HTML: geen add_header hier, zodat de server-level security headers wél
    # worden geërfd. Cache-Control via expires (dat reset de add_header-
    # inheritance niet) -> Cache-Control: no-cache, dus altijd revalideren.
    location / {
        expires -1;
        try_files $uri $uri/ =404;
    }

    access_log off;
    error_log  /var/log/nginx/diversions.nl-error.log error;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Astro's eigen 404-pagina (apps/web/dist/404.html).
    error_page 404 /404.html;

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/diversions.nl/after/*;
