# ===========================================================================
# nginx-configuratie diversions.nl (Ploi) — statische Astro-site
# Versie 2026-07-16c. Volledig bestand: in Ploi -> Sites -> diversions.nl ->
# Manage -> Edit NGINX configuration ALLES vervangen door deze inhoud,
# opslaan, en nginx laten herladen (opslaan alleen is niet activeren).
#
# Wijzigingen t.o.v. de Ploi-standaard (PHP-template):
# - PHP-blok, index.php en error_page->index.php verwijderd (statische site).
# - try_files zonder PHP-fallback; nette statische 404 (/404.html).
# - Verhuisbestand: 301-redirects + 410 GONE uit seo-redirects.conf (bron:
#   inventaris.json). Wijzigingen ALTIJD eerst in seo-redirects.conf in de
#   repo doorvoeren en dan hier overnemen.
# - Staging (ploi.link) krijgt X-Robots-Tag noindex; productie niet.
# - Force-https + HSTS alleen voor het echte domein (staging termineert TLS
#   bij Ploi en zou anders in een redirect-lus komen).
# - Cache-headers: /_astro/* (gehasht) + fonts 1 jaar immutable; media 30 dagen.
#
# Wijziging in versie 2026-07-16c (PageSpeed): fonts van 7 dagen naar 1 jaar
# immutable, overige media naar 30 dagen (eigen assets langer cachebaar).
#
# Wijzigingen in versie 2026-07-16b (audit The Website Specification):
# - HSTS: max-age 6mnd -> 1 jaar + includeSubDomains (zie waarschuwing bij de map).
# - Content-Security-Policy "frame-ancestors 'self'" toegevoegd (clickjacking).
# - Permissions-Policy toegevoegd (ongebruikte browserfeatures uitgezet).
# - HTML krijgt Cache-Control: no-cache (via expires -1) i.p.v. geen cache-header.
# - manifest.webmanifest krijgt correct MIME (application/manifest+json).
# - Verouderde X-XSS-Protection verwijderd (deprecated, door browsers genegeerd).
# - Security headers herhaald in de asset-locations (add_header erft niet als
#   een location een eigen add_header heeft) -> assets kregen voorheen geen
#   nosniff/HSTS.
# ===========================================================================

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/diversions.nl/before/*;

# Staging niet laten indexeren. Lege waarde = header wordt niet meegestuurd.
map $host $staging_noindex {
    default "";
    "friendly-dust-xs6wxtya91.ploi.link" "noindex, nofollow";
}

# HSTS alleen op het echte domein (1 jaar, met includeSubDomains, zonder preload).
# LET OP: includeSubDomains dwingt HTTPS af op ELK subdomein van diversions.nl.
# Bevestig dat alle *.diversions.nl-subdomeinen een geldig certificaat hebben
# voordat dit live gaat; zo niet, verwijder "; includeSubDomains".
map $host $hsts_header {
    default "";
    "diversions.nl" "max-age=31536000; includeSubDomains";
    "www.diversions.nl" "max-age=31536000; includeSubDomains";
}

# Force-https alleen voor het echte domein. Het ploi.link-stagingdomein
# termineert TLS bij Ploi (verzoek komt hier als http binnen); een kale
# scheme-check zou daar een oneindige redirect-lus geven.
map "$scheme:$host" $force_https {
    default 0;
    "http:diversions.nl" 1;
    "http:www.diversions.nl" 1;
}

server {
    listen 80;
    listen [::]:80;

    # Relatieve redirect-doelen niet laten opblazen naar http://-Locations.
    absolute_redirect off;

    root /home/ploi/diversions.nl/apps/web/dist;
    server_name diversions.nl friendly-dust-xs6wxtya91.ploi.link;

    include /etc/nginx/ssl/diversions.nl;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/nginx/dhparams.pem;

    index index.html;

    if ($force_https) {
        return 301 https://$host$request_uri;
    }

    # Security headers op server-niveau. Deze gelden voor responses die zélf
    # geen add_header hebben (o.a. de HTML uit location /). Locations met een
    # eigen add_header (de asset-blokken hieronder) erven deze NIET en herhalen
    # daarom zelf de relevante headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), browsing-topics=()" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header X-Robots-Tag $staging_noindex always;
    add_header Strict-Transport-Security $hsts_header always;

    charset utf-8;

    # Ploi Configuration, do not remove!
    include /etc/nginx/ploi/diversions.nl/server/*;

    # =======================================================================
    # 301-redirects WordPress -> Astro (bron: seo-redirects.conf / inventaris)
    # =======================================================================
    rewrite ^/72547-2/?$ / permanent;
    rewrite ^/ab-testen/?$ /onze-diensten permanent;
    rewrite ^/ai-onderzoek/?$ /services/ai-onderzoek permanent;
    rewrite ^/beleving-verbeteren/?$ /services/patient-journey permanent;
    rewrite ^/beperkte-keuze-de-waarde-voor-marketing/?$ /blog/beperkte-keuze-de-waarde-voor-marketing permanent;
    rewrite ^/besparen-op-marketingkosten-doe-het-met-beleid/?$ / permanent;
    rewrite ^/cases-overzichtspagina/?$ /work permanent;
    rewrite ^/cases-overzichtspagina/case-caser/?$ /work/case-caser permanent;
    rewrite ^/cases-overzichtspagina/case-erfrechtshulp/?$ /work/case-erfrechtshulp permanent;
    rewrite ^/cases-overzichtspagina/case-ggnet/?$ /work/case-ggnet permanent;
    rewrite ^/cases-overzichtspagina/case-rodekruis/?$ /work/case-rodekruis permanent;
    rewrite ^/cases-overzichtspagina/leefjepensioen/?$ /work/leefjepensioen permanent;
    rewrite ^/cases-overzichtspagina/pensioencursus/?$ /work/pensioencursus permanent;
    rewrite ^/cbs-vijftigduizend-bedrijven-verdienen-vooral-online/?$ / permanent;
    rewrite ^/communicatie-strategie/?$ /onze-diensten permanent;
    rewrite ^/content-recycling-omdat-nieuw-niet-altijd-beter/?$ / permanent;
    rewrite ^/contentmarketing-motor-groei/?$ /onze-diensten permanent;
    rewrite ^/conversie-optimalisatie/?$ /onze-diensten permanent;
    rewrite ^/conversie-optimalisatie-specialist/?$ /onze-diensten permanent;
    rewrite ^/coping-stijlen-hoe-mensen-omgaan-met-een-ziekte/?$ /blog/coping-stijlen-hoe-mensen-omgaan-met-een-ziekte permanent;
    rewrite ^/customer-journey/?$ /services/customer-journey permanent;
    rewrite ^/customer-journey-passend-bij-iedere-generatie/?$ /blog/customer-journey-passend-bij-iedere-generatie permanent;
    rewrite ^/customerjourney-mapping-de-route/?$ /blog/customerjourney-mapping-de-route permanent;
    rewrite ^/customerjourney-optimalisatie-personalisatie/?$ /onze-diensten permanent;
    rewrite ^/design-sprint/?$ /onze-diensten permanent;
    rewrite ^/diary-study/?$ /services/diary-study permanent;
    rewrite ^/e-motions-echte-emoties-op-het-web/?$ / permanent;
    rewrite ^/eyetracking-simulatie/?$ /services/eyetracking-simulatie permanent;
